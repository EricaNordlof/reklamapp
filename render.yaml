services:
  - type: web
    name: offroad-bumpis-marketing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn marketing_app:app
    disk:
      name: offroad-bumpis-marketing-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: BOOKING_URL
        value: https://offroad-bumpis-booking.onrender.com/
