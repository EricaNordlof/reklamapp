<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Marketing OS | Offroad Bumpis{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
  <style>
    :root {
      --green:#0f5f2f;
      --green-dark:#0b3b1f;
      --mint:#ecfdf3;
      --mint-border:#bbf7d0;
      --navy:#111827;
      --slate:#475569;
      --border:#e2e8f0;
      --warning:#fff8dd;
      --warning-border:#fde68a;
      --danger:#fee2e2;
      --danger-border:#fecaca;
    }

    * { box-sizing:border-box; }

    body {
      font-family: Arial, sans-serif;
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
      background:#f7f7fb;
      color:#111827;
    }

    .brand {
      display:flex;
      justify-content:center;
      margin-bottom:18px;
    }

    .brand-mark {
      width:min(360px, 86vw);
      min-height:86px;
      background:linear-gradient(135deg, #0f5f2f, #0b3b1f);
      color:white;
      border-radius:18px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      box-shadow:0 8px 24px rgba(15,95,47,.22);
      padding:14px 20px;
      letter-spacing:.01em;
    }

    .brand-mark strong {
      display:block;
      font-size:28px;
      line-height:1.05;
      font-weight:900;
    }

    .brand-mark span {
      display:block;
      margin-top:4px;
      font-size:13px;
      opacity:.9;
      font-weight:700;
    }

    .nav {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:10px;
      margin:0 0 18px;
    }

    .nav a {
      color:#0f172a;
      background:#fff;
      border:1px solid var(--border);
      border-radius:999px;
      padding:9px 13px;
      text-decoration:none;
      font-weight:900;
      box-shadow:0 3px 14px rgba(0,0,0,.04);
    }

    .card {
      background:white;
      padding:26px;
      border-radius:18px;
      box-shadow:0 8px 28px rgba(0,0,0,.08);
      margin-bottom:18px;
    }

    h1 {
      margin:0 0 10px;
      font-size:34px;
      line-height:1.05;
    }

    h2 {
      margin:0 0 12px;
      font-size:24px;
    }

    h3 {
      margin:0 0 8px;
      font-size:18px;
    }

    .lead {
      margin:0 0 14px;
      color:#334155;
      line-height:1.45;
    }

    .info {
      background:var(--mint);
      border:1px solid var(--mint-border);
      border-radius:14px;
      padding:14px;
      margin:14px 0 20px;
      font-size:15px;
      line-height:1.45;
    }

    .note {
      background:var(--warning);
      border:1px solid var(--warning-border);
      border-radius:14px;
      padding:13px;
      margin:12px 0;
      font-weight:700;
      color:#513b08;
      line-height:1.35;
    }

    .error {
      background:var(--danger);
      border:1px solid var(--danger-border);
      padding:12px;
      border-radius:10px;
      font-weight:700;
      margin:0 0 14px;
    }

    label {
      display:block;
      margin-top:14px;
      font-weight:700;
    }

    input,
    textarea,
    select {
      width:100%;
      padding:11px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      box-sizing:border-box;
      background:#fff;
      font:inherit;
    }

    textarea {
      resize:vertical;
      min-height:110px;
      line-height:1.38;
    }

    .copy-textarea {
      min-height:250px;
      white-space:pre-wrap;
    }

    small {
      color:var(--slate);
      display:block;
      margin-top:5px;
      line-height:1.35;
    }

    button,
    .button {
      display:inline-block;
      margin-top:12px;
      padding:11px 16px;
      border:0;
      border-radius:999px;
      background:var(--navy);
      color:white;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      font:inherit;
    }

    button:hover,
    .button:hover { background:#020617; }

    .button.green,
    button.green { background:var(--green); }
    .button.green:hover,
    button.green:hover { background:var(--green-dark); }

    .button.light,
    button.light {
      background:#fff;
      color:#0f172a;
      border:1px solid var(--border);
    }

    .button.light:hover,
    button.light:hover { background:#f8fafc; }

    .button.danger,
    button.danger {
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .button.danger:hover,
    button.danger:hover { background:#fecaca; }

    .row {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .grid-3 {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .grid-4 {
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:14px;
    }

    .mini-card {
      background:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      box-shadow:0 3px 14px rgba(0,0,0,.04);
    }

    .stat {
      display:block;
      font-size:32px;
      line-height:1.1;
      font-weight:900;
      color:#143b20;
      margin-bottom:4px;
    }

    .subtle { color:var(--slate); line-height:1.45; }

    .actions {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:14px;
      overflow:hidden;
    }

    th,
    td {
      border:1px solid #cbd5e1;
      padding:8px;
      vertical-align:top;
      text-align:left;
    }

    th {
      background:#111827;
      color:white;
    }

    .status,
    .version-badge {
      display:inline-block;
      padding:4px 9px;
      border-radius:999px;
      background:#f1f5f9;
      color:#0f172a;
      font-weight:900;
      font-size:13px;
    }

    .status.active,
    .status.posted,
    .status.done,
    .status.bokad { background:#dcfce7; color:#166534; }

    .status.paused,
    .status.todo,
    .status.draft,
    .status.kontaktad,
    .status.svarat,
    .status.inte_nu { background:#fff8dd; color:#713f12; }

    .status.död,
    .status.hidden { background:#fee2e2; color:#991b1b; }

    .post-card {
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      margin-top:14px;
      background:#fff;
      box-shadow:0 3px 14px rgba(0,0,0,.04);
    }

    .post-head {
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }

    .qr-box {
      display:flex;
      gap:16px;
      align-items:center;
      flex-wrap:wrap;
    }

    .qr-box img {
      width:150px;
      height:150px;
      border:1px solid var(--border);
      border-radius:14px;
      background:white;
    }

    .link-list {
      display:grid;
      gap:8px;
    }

    .link-pill {
      display:grid;
      grid-template-columns:160px 1fr auto;
      gap:8px;
      align-items:center;
      background:#f8fafc;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px;
    }

    .link-pill input { margin:0; }

    .inline-form {
      display:grid;
      gap:8px;
    }

    .focus-list {
      display:grid;
      gap:10px;
      margin-top:12px;
    }

    .focus-item {
      border:1px solid var(--mint-border);
      background:var(--mint);
      border-radius:14px;
      padding:12px;
    }

    .quick-template {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:10px 0 4px;
    }

    .quick-template button { margin-top:0; }

    @media(max-width:800px) {
      body { padding:12px; }
      .card { padding:18px; }
      h1 { font-size:28px; }
      .brand-mark { width:100%; min-height:78px; }
      .brand-mark strong { font-size:24px; }
      .row,
      .grid-3,
      .grid-4,
      .link-pill { grid-template-columns:1fr; }
      table { font-size:12px; }
      th, td { padding:6px; }
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-mark">
      <strong>Offroad Bumpis</strong>
      <span>Marketing OS</span>
    </div>
  </div>

  {% if session.get('admin') %}
  <nav class="nav">
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('leads') }}">Leads</a>
    <a href="{{ url_for('places') }}">Platser/grupper</a>
    <a href="{{ url_for('export_leads') }}">Exportera leads</a>
    <a href="{{ url_for('logout') }}">Logga ut</a>
  </nav>
  {% endif %}

  {% block body %}{% endblock %}

  <script>
    function copyById(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.select();
      el.setSelectionRange(0, 999999);
      navigator.clipboard.writeText(el.value).then(() => {
        const old = document.activeElement;
        if (old && old.tagName === 'BUTTON') {
          const text = old.textContent;
          old.textContent = 'Kopierat';
          setTimeout(() => old.textContent = text, 1200);
        }
      }).catch(() => document.execCommand('copy'));
    }

    function fillCampaignTemplate(type) {
      const data = {
        barnkalas: {
          name: 'Barnkalas med bumperballs',
          audience: 'Föräldrar / barnkalas',
          product: 'Barnbollar',
          area: 'Malmö, Lund, Trelleborg',
          offer: 'Boka nu utan kostnad. Betala senast 3 dagar före utlämning, annars släpps bokningen bara.',
          notes: 'Facebookgrupper för barnfamiljer, Instagram, flyers vid parker och caféer.'
        },
        skola: {
          name: 'Skolavslutning med bumperballs',
          audience: 'Skola / fritids',
          product: 'Barnbollar + vuxenbollar',
          area: 'Skåne',
          offer: 'Enkel aktivitet för skola/fritids. Boka datum nu och betala enligt överenskommelse.',
          notes: 'Maila skolor, fritids, klassföräldrar och föreningar.'
        },
        forening: {
          name: 'Lagavslutning med bumperballs',
          audience: 'Förening / lag',
          product: 'Barnbollar + vuxenbollar',
          area: 'Skåne',
          offer: 'Passar avslutning, cupdag eller rolig extraträning. Boka datum nu, betala senare.',
          notes: 'Maila lagledare, föreningar och ungdomslag.'
        },
        foretag: {
          name: 'Kickoff med bumperballs',
          audience: 'Företag / kickoff',
          product: 'Vuxenbollar',
          area: 'Malmö, Lund, Helsingborg',
          offer: 'Boka vuxenbollar till kickoff, AW eller företagsevent. Leverans inom Skåne kan bokas.',
          notes: 'Maila lokala företag, eventansvariga och kontor.'
        },
        flyer: {
          name: 'Flyers vid park och café',
          audience: 'Café / park / samarbeten',
          product: 'Bumperballs med leverans',
          area: 'Malmö',
          offer: 'Boka utan kostnad. Betala senast 3 dagar före utlämning. QR-kod finns på flyern.',
          notes: 'Lägg flyers vid caféer nära parker, hallar och aktivitetsytor.'
        }
      }[type];
      if (!data) return;
      for (const key of ['name', 'area', 'offer', 'notes']) {
        const el = document.getElementById(key);
        if (el) el.value = data[key];
      }
      const audience = document.getElementById('audience');
      if (audience) audience.value = data.audience;
      const product = document.getElementById('product');
      if (product) product.value = data.product;
    }
  </script>
</body>
</html>
